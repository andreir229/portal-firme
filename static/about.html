<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despre - Portal Firme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .about-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-top: 30px;
            margin-bottom: 50px;
        }
        
        .markdown-body {
            line-height: 1.6;
            color: #333;
        }
        
        .markdown-body h1 { border-bottom: 2px solid #667eea; padding-bottom: 10px; margin-top: 0; }
        .markdown-body h2 { border-bottom: 1px solid #eee; padding-bottom: 8px; margin-top: 30px; }
        .markdown-body code { background: #f4f4f4; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        .markdown-body pre { background: #f4f4f4; padding: 15px; border-radius: 8px; overflow-x: auto; }
        .markdown-body ul { padding-left: 20px; }
        .markdown-body li { margin-bottom: 8px; }
        
        .back-nav {
            margin-bottom: 20px;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="header-content">
                <h1>
                    <a href="/" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 15px;">
                        <div class="header-icon">
                            <i class="fas fa-info-circle"></i>
                        </div>
                        <span>Despre Proiect</span>
                    </a>
                </h1>
                <p>Informații și documentație Portal Firme</p>
            </div>
            <nav class="header-nav">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i> Acasă
                </a>
                <a href="/about" class="nav-link">
                    <i class="fas fa-info-circle"></i> Despre
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="about-container">
            <div class="back-nav">
                <a href="/" class="back-link">
                    <i class="fas fa-arrow-left"></i> Înapoi la Acasă
                </a>
            </div>
            
            <div id="loading" class="loading active">
                <div class="spinner"></div>
                <p>Se încarcă documentația...</p>
            </div>
            
            <div id="readme-content" class="markdown-body"></div>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentYear"></span> Portal Firme - Informații oficiale despre companiile din România</p>
    </footer>

    <script>
        async function loadReadme() {
            try {
                const response = await fetch('/readme');
                const data = await response.json();
                
                document.getElementById('loading').classList.remove('active');
                document.getElementById('readme-content').innerHTML = marked.parse(data.content);
            } catch (error) {
                console.error('Error loading readme:', error);
                document.getElementById('loading').innerHTML = '<p style="color: red;">Eroare la încărcarea documentației.</p>';
            }
        }

        // Set current year
        document.getElementById('currentYear').textContent = new Date().getFullYear();
        
        // Load content
        loadReadme();
    </script>
</body>
</html>
